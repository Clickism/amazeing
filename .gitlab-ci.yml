stages:
  - build
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == 'master'

build:
  stage: build
  tags:
    - npm-build
  script:
    - npm install
    - npm run build
  artifacts:
    when: on_success
    access: none
    expire_in: 1 day
    paths:
      - dist/

deploy-prog2vk:
  stage: deploy
  tags:
    - prog2vk.cs.uni-saarland.de
  script:
    - cp -r "${CI_PROJECT_DIR}/dist/." "/var/www/amazeing/"
  dependencies:
    - build
